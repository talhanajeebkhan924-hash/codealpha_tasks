<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .product-card{
            background:#fff;
            border-radius:15px;
            padding:30px;
            box-shadow:0 0 20px rgba(0,0,0,.08);
            margin-top:50px;
        }

        .product-image{
            width:100%;
            height:450px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            color:green;
            font-weight:bold;
            font-size:30px;
        }

        .stock{
            font-weight:bold;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="product-card">

        <div class="row">

            <div class="col-md-6">

                {% if product.image %}
                    <img src="{{ product.image.url }}" class="product-image" alt="{{ product.name }}">
                {% else %}
                    <img src="https://via.placeholder.com/500x450" class="product-image" alt="{{ product.name }}">
                {% endif %}

            </div>

            <div class="col-md-6">

                <h1>{{ product.name }}</h1>

                <h2 class="price">
                    Rs. {{ product.price }}
                </h2>

                <hr>

                <p>
                    {{ product.description }}
                </p>

                <p class="stock">
                    Stock :
                    {{ product.stock }}
                </p>

                <br>

                {% if user.is_authenticated %}

                <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success btn-lg">
                    🛒 Add to Cart
                </a>

                {% else %}

                <a href="{% url 'login' %}" class="btn btn-success btn-lg">
                    Login to Buy
                </a>

                {% endif %}

                <a href="/" class="btn btn-secondary btn-lg">
                    Back
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
